<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>CrawlStar — M1</title>
  <style>
    @font-face {
      font-family: "DOS VGA";
      src: url("/fonts/PerfectDosVGA437/Perfect DOS VGA 437 Win.ttf") format("truetype");
    }
    @font-face {
      font-family: "Alagard";
      src: url("/fonts/Alagard/alagard.ttf") format("truetype");
    }
    @font-face {
      font-family: "Liberation Sans";
      src: url("/fonts/LiberationSans/LiberationSans-Regular.ttf") format("truetype");
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      /* the game owns all touch gestures — no scroll/zoom/refresh hijacking */
      touch-action: none;
      overscroll-behavior: none;
    }

    #frame {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #7ee06a;
      text-shadow: 2px 2px 0 #000;
    }
    .hud-top { position: absolute; top: 16px; left: 20px; }
    .hud-title {
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 34px;
      letter-spacing: 2px;
      color: #b8e6a0;
    }
    .hud-sub, .hud-line, .hud-help {
      font-family: "DOS VGA", monospace;
      font-size: 16px;
      margin-top: 6px;
    }
    .hud-help { color: #557a5a; }
    .hud-area {
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 20px;
      color: #9ab8d8;
    }
    .hud-roster { margin-top: 10px; font-family: "DOS VGA", monospace; font-size: 14px; color: #86a88c; }
    .hud-instruments { margin-top: 8px; font-family: "DOS VGA", monospace; font-size: 14px; }
    .instr-label { color: #557a5a; }
    .instr { margin-right: 8px; }
    .instr.held { color: #8be0ff; text-shadow: 0 0 6px rgba(102, 224, 255, 0.6); }
    .instr.locked { color: #55607a; }
    .hud-sealed {
      position: fixed;
      left: 50%; top: 46%;
      transform: translateX(-50%);
      display: none;
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 26px;
      color: #e0a04a;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
    }
    .hud-acquire {
      position: fixed;
      left: 50%; top: 34%;
      transform: translateX(-50%);
      display: none;
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 30px;
      color: #b8e6ff;
      text-shadow: 2px 2px 0 #000, 0 0 12px rgba(102, 224, 255, 0.7);
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .hud-prompt {
      position: absolute;
      left: 50%;
      top: 62%;
      transform: translateX(-50%);
      font-family: "DOS VGA", monospace;
      font-size: 20px;
      color: #b8e6a0;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* combat HUD (bottom-centre) */
    .hud-combat {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 360px;
      pointer-events: none;
      font-family: "DOS VGA", monospace;
    }
    .cbar {
      position: relative;
      height: 18px;
      background: rgba(10, 12, 16, 0.7);
      border: 2px solid #2a3140;
      margin-top: 4px;
    }
    .cbar.bulwark { height: 10px; }
    .cbar-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 100%; transition: width 0.12s linear; }
    .cbar-fill.hp { background: #8be06a; }
    .cbar-fill.res { background: #5a9ad8; }
    .cbar-text {
      position: absolute; inset: 0;
      text-align: center; font-size: 13px; color: #eaf2e0;
      text-shadow: 1px 1px 0 #000; line-height: 18px;
    }
    .hud-abilities { display: flex; gap: 6px; margin-top: 6px; justify-content: center; }
    .ability {
      flex: 1;
      border: 2px solid #2a3140;
      background: rgba(10, 12, 16, 0.7);
      padding: 3px 2px;
      text-align: center;
      color: #55607a;
      font-size: 11px;
      opacity: 0.6;
    }
    .ability.ready { color: #b8e6a0; border-color: #4a6a3a; opacity: 1; }
    .ability-key { display: block; font-size: 13px; color: #9ab8d8; }
    .ability.ready .ability-key { color: #cfe6b0; }

    .hud-downed {
      position: fixed;
      left: 50%; top: 40%;
      transform: translateX(-50%);
      display: none;
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 40px;
      color: #e0603a;
      text-shadow: 3px 3px 0 #000;
      pointer-events: none;
    }

    /* floating nameplates + HP bars — native-res DOM projected from world space
       (kept OUT of the internal-res post chain so text stays legible; Docs/01 §3) */
    .wl-layer { position: fixed; inset: 0; pointer-events: none; z-index: 44; }
    .wl-label {
      position: absolute;
      transform-origin: 50% 100%;
      text-align: center;
      white-space: nowrap;
      will-change: left, top, transform, opacity;
    }
    .wl-name {
      font-family: "DOS VGA", monospace;
      font-size: 15px;
      line-height: 1;
      color: #d8a0a0; /* enemy default */
      /* hard 1px outline for contrast against any background — crisp, not blurred */
      text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
      margin-bottom: 3px;
    }
    .wl-name.wl-party { color: #b8e6a0; }
    .wl-bar {
      width: 52px;
      height: 6px;
      margin: 0 auto;
      background: #101014;
      border: 1px solid #000;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.55);
    }
    .wl-fill { height: 100%; width: 100%; background: #8be06a; }

    /* floating damage numbers */
    .fx-numbers { position: fixed; inset: 0; pointer-events: none; z-index: 45; }
    .fx-num {
      position: absolute;
      transform: translate(-50%, -50%);
      font-family: "DOS VGA", monospace;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      white-space: nowrap;
    }

    /* virtual gamepad (touch) */
    #touch-controls { position: fixed; inset: 0; pointer-events: none; z-index: 40; }
    .tc-stick {
      position: absolute;
      width: 112px; height: 112px;
      border: 2px solid rgba(126, 224, 106, 0.4);
      border-radius: 50%;
      background: rgba(20, 30, 22, 0.25);
      opacity: 0.35;
      pointer-events: none;
      left: 12vw; top: 62vh;
    }
    .tc-nub {
      position: absolute;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(126, 224, 106, 0.5);
      left: 34px; top: 34px;
    }
    .tc-btn {
      position: absolute;
      pointer-events: auto;
      font-family: "DOS VGA", monospace;
      font-size: 14px;
      color: #b8e6a0;
      border: 2px solid rgba(126, 224, 106, 0.45);
      border-radius: 50%;
      background: rgba(20, 30, 22, 0.35);
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .tc-btn.tc-held { background: rgba(126, 224, 106, 0.35); }
    .tc-jump { width: 84px; height: 84px; right: 6vw; bottom: 10vh; }
    .tc-sprint { width: 64px; height: 64px; right: calc(6vw + 100px); bottom: 6vh; font-size: 12px; }
    .tc-cam { width: 54px; height: 54px; right: 6vw; bottom: calc(10vh + 104px); font-size: 12px; }

    #loading-plate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 2px, transparent 2px 4px),
        radial-gradient(ellipse at 50% 60%, #1d2432 0%, #12161f 55%, #0a0c12 100%);
      z-index: 50;
      transition: opacity 0.25s ease;
      text-align: center;
      flex-direction: column;
    }
    .plate-kicker {
      font-family: "DOS VGA", monospace;
      font-size: 16px;
      color: #557a5a;
      letter-spacing: 3px;
    }
    .plate-name {
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 54px;
      color: #b8e6a0;
      margin: 14px 0 18px;
      text-shadow: 3px 3px 0 #000;
    }
    .plate-hint {
      font-family: "Liberation Sans", sans-serif;
      font-style: italic;
      font-size: 16px;
      color: #7d8aa0;
      max-width: 520px;
    }
  </style>
</head>
<body>
  <div id="frame"><canvas id="game" width="480" height="270"></canvas></div>
  <div id="hud"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
