<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>CrawlStar — M1</title>
  <style>
    @font-face {
      font-family: "DOS VGA";
      src: url("/fonts/PerfectDosVGA437/Perfect DOS VGA 437 Win.ttf") format("truetype");
    }
    @font-face {
      font-family: "Alagard";
      src: url("/fonts/Alagard/alagard.ttf") format("truetype");
    }
    @font-face {
      font-family: "Liberation Sans";
      src: url("/fonts/LiberationSans/LiberationSans-Regular.ttf") format("truetype");
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      /* the game owns all touch gestures — no scroll/zoom/refresh hijacking */
      touch-action: none;
      overscroll-behavior: none;
    }

    #frame {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #7ee06a;
      text-shadow: 2px 2px 0 #000;
    }
    .hud-top { position: absolute; top: 16px; left: 20px; }
    .hud-title {
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 34px;
      letter-spacing: 2px;
      color: #b8e6a0;
    }
    .hud-sub, .hud-line, .hud-help {
      font-family: "DOS VGA", monospace;
      font-size: 16px;
      margin-top: 6px;
    }
    .hud-help { color: #557a5a; }
    .hud-area {
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 20px;
      color: #9ab8d8;
    }
    .hud-roster { margin-top: 10px; font-family: "DOS VGA", monospace; font-size: 14px; color: #86a88c; }
    .hud-prompt {
      position: absolute;
      left: 50%;
      top: 62%;
      transform: translateX(-50%);
      font-family: "DOS VGA", monospace;
      font-size: 20px;
      color: #b8e6a0;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* virtual gamepad (touch) */
    #touch-controls { position: fixed; inset: 0; pointer-events: none; z-index: 40; }
    .tc-stick {
      position: absolute;
      width: 112px; height: 112px;
      border: 2px solid rgba(126, 224, 106, 0.4);
      border-radius: 50%;
      background: rgba(20, 30, 22, 0.25);
      opacity: 0.35;
      pointer-events: none;
      left: 12vw; top: 62vh;
    }
    .tc-nub {
      position: absolute;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(126, 224, 106, 0.5);
      left: 34px; top: 34px;
    }
    .tc-btn {
      position: absolute;
      pointer-events: auto;
      font-family: "DOS VGA", monospace;
      font-size: 14px;
      color: #b8e6a0;
      border: 2px solid rgba(126, 224, 106, 0.45);
      border-radius: 50%;
      background: rgba(20, 30, 22, 0.35);
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .tc-btn.tc-held { background: rgba(126, 224, 106, 0.35); }
    .tc-jump { width: 84px; height: 84px; right: 6vw; bottom: 10vh; }
    .tc-sprint { width: 64px; height: 64px; right: calc(6vw + 100px); bottom: 6vh; font-size: 12px; }
    .tc-cam { width: 54px; height: 54px; right: 6vw; bottom: calc(10vh + 104px); font-size: 12px; }

    #loading-plate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 2px, transparent 2px 4px),
        radial-gradient(ellipse at 50% 60%, #1d2432 0%, #12161f 55%, #0a0c12 100%);
      z-index: 50;
      transition: opacity 0.25s ease;
      text-align: center;
      flex-direction: column;
    }
    .plate-kicker {
      font-family: "DOS VGA", monospace;
      font-size: 16px;
      color: #557a5a;
      letter-spacing: 3px;
    }
    .plate-name {
      font-family: "Alagard", "DOS VGA", monospace;
      font-size: 54px;
      color: #b8e6a0;
      margin: 14px 0 18px;
      text-shadow: 3px 3px 0 #000;
    }
    .plate-hint {
      font-family: "Liberation Sans", sans-serif;
      font-style: italic;
      font-size: 16px;
      color: #7d8aa0;
      max-width: 520px;
    }
  </style>
</head>
<body>
  <div id="frame"><canvas id="game" width="480" height="270"></canvas></div>
  <div id="hud"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
